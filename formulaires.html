<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulaires reçus | Administration SOFRETMA TRANSIT</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="images/logo-sofretma-blanc.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

  <div class="admin-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar__logo">
        <picture>
          <source srcset="images/logo-sofretma-blanc.webp" type="image/webp">
          <img src="images/logo-sofretma-blanc.png" alt="SOFRETMA TRANSIT" width="140">
        </picture>
      </div>
      <nav class="sidebar__nav">
        <a href="dashboard.html" class="sidebar__lien">
          <span class="icone">🏠</span> Tableau de bord
        </a>
        <a href="clients.html" class="sidebar__lien">
          <span class="icone">👥</span> Clients inscrits
        </a>
        <a href="paiements.html" class="sidebar__lien">
          <span class="icone">💰</span> Paiements
        </a>
        <a href="actualites.html" class="sidebar__lien">
          <span class="icone">📰</span> Actualités
        </a>
        <a href="medias.html" class="sidebar__lien">
          <span class="icone">🖼️</span> Médiathèque
        </a>
        <a href="formulaires.html" class="sidebar__lien actif">
          <span class="icone">📋</span> Formulaires reçus
        </a>
        <div class="sidebar__separateur"></div>
      </nav>
      <div class="sidebar__footer">
        <button class="sidebar__deconnexion" id="btn-deconnexion">
          <span class="icone">🚪</span> Déconnexion
        </button>
      </div>
    </aside>

    <!-- CONTENU PRINCIPAL -->
    <div class="contenu-principal">

      <header class="topbar">
        <div style="display:flex;align-items:center;gap:12px;">
          <button class="hamburger-admin" id="hamburger-admin" aria-label="Menu">
            <span></span><span></span><span></span>
          </button>
          <h1 class="topbar__titre">Formulaires reçus</h1>
        </div>
        <div class="topbar__droite">
          <button class="btn btn--vert btn--sm" id="btn-export-formulaires">⬇ Export CSV</button>
        </div>
      </header>

      <main class="page-contenu">

        <!-- Compteurs rapides -->
        <div class="stats-grille" style="grid-template-columns:repeat(3,1fr);margin-bottom:24px;">
          <div class="stat-card stat-card--bleu">
            <div class="stat-card__icone">📋</div>
            <div class="stat-card__valeur" id="compteur-total">—</div>
            <div class="stat-card__label">Total reçu</div>
          </div>
          <div class="stat-card stat-card--vert">
            <div class="stat-card__icone">✅</div>
            <div class="stat-card__valeur" id="compteur-traites">—</div>
            <div class="stat-card__label">Traités</div>
          </div>
          <div class="stat-card stat-card--or">
            <div class="stat-card__icone">⏳</div>
            <div class="stat-card__valeur" id="compteur-attente">—</div>
            <div class="stat-card__label">En attente</div>
          </div>
        </div>

        <!-- Barre d'outils -->
        <div class="barre-outils">
          <div class="barre-outils__recherche">
            <input type="text" id="recherche-formulaires" placeholder="Rechercher par nom ou email...">
          </div>
          <select id="filtre-type">
            <option value="">Tous les types</option>
            <option value="Maritime">Maritime</option>
            <option value="Aérien">Aérien</option>
            <option value="Ferroviaire">Ferroviaire</option>
            <option value="Terrestre">Terrestre</option>
            <option value="Bureau d'achats">Bureau d'achats</option>
            <option value="Voyages">Voyages</option>
            <option value="Prestations">Prestations</option>
            <option value="Marketing Digital">Marketing Digital</option>
          </select>
          <select id="filtre-traite">
            <option value="">Tous les statuts</option>
            <option value="non_traite">En attente</option>
            <option value="traite">Traités</option>
          </select>
        </div>

        <!-- Tableau formulaires -->
        <div class="card">
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>Type</th>
                  <th>Nom</th>
                  <th>Email</th>
                  <th>Téléphone</th>
                  <th>Date envoi</th>
                  <th>Statut</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="tbody-formulaires">
                <tr><td colspan="7" class="chargement">Chargement des données...</td></tr>
              </tbody>
            </table>
          </div>
          <div class="pagination">
            <span class="pagination__info" id="info-pagination"></span>
          </div>
        </div>

      </main>
    </div>

  </div>

  <!-- MODALE DÉTAIL FORMULAIRE -->
  <div class="overlay" id="overlay-detail-formulaire">
    <div class="modale">
      <div class="modale__entete">
        <h2 class="modale__titre">Détails du formulaire</h2>
        <button class="modale__fermer" aria-label="Fermer">✕</button>
      </div>
      <div class="modale__corps" id="detail-formulaire-corps"></div>
      <div class="modale__pied">
        <button class="btn btn--gris btn-fermer-modale">Fermer</button>
      </div>
    </div>
  </div>

  <!-- Notifications -->
  <div class="toast-container" id="toast-container"></div>

  <script src="js/auth.js"></script>
  <script src="js/formulaires.js"></script>

</body>
</html>
